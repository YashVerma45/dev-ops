name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Build JAR
        run: |
          chmod +x mvnw
          ./mvnw -B -DskipTests package
          mkdir -p deploy
          cp target/*jar deploy/bidder.jar

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Copy JAR to server
        run: |
          scp -o StrictHostKeyChecking=no deploy/bidder.jar \
          ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:/opt/bidder/

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'ENDSSH'
            sudo mkdir -p /opt/bidder
            sudo systemctl daemon-reload
            sudo systemctl restart bidder
            sleep 5
            sudo systemctl status bidder --no-pager
          ENDSSH
