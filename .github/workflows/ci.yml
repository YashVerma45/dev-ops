name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Maven verify
        run: chmod +x mvnw && ./mvnw -B -ntp -DtrimStackTrace=false verify

      - name: Upload Spring Boot JAR
        uses: actions/upload-artifact@v4
        with:
          name: bidder-jar
          path: target/bidder-*.jar
          if-no-files-found: error
